name: 🐍 • Packaging

on:
  workflow_call:
    inputs:
      runs-on:
        description: "The runner image to test on"
        default: "ubuntu-24.04"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-python-packaging-cibw-${{ inputs.runs-on }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-wheel:
    name: 🎡 ${{ inputs.runs-on }}
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ !startsWith(inputs.runs-on, 'ubuntu') }}
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      # set up sccache for faster builds (non-Ubuntu only)
      - name: Install sccache
        if: ${{ !startsWith(inputs.runs-on, 'ubuntu') }}
        run: uv tool install sccache

      - name: Install prebuilt libcurl (Windows)
        if: startsWith(inputs.runs-on, 'windows')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $arch = "${{ runner.arch }}".ToUpperInvariant()
          switch ($arch) {
            "X64" { $curlUrl = "https://curl.se/windows/latest.cgi?p=win64-mingw.zip" }
            "ARM64" { $curlUrl = "https://curl.se/windows/latest.cgi?p=win64a-mingw.zip" }
            default { throw "Unsupported Windows architecture: $arch" }
          }

          $curlRoot = Join-Path $env:RUNNER_TEMP "curl-prebuilt"
          $zipPath = Join-Path $curlRoot "curl.zip"
          New-Item -Path $curlRoot -ItemType Directory -Force | Out-Null
          Invoke-WebRequest -Uri $curlUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $curlRoot -Force

          $curlPrefix = Get-ChildItem -Path $curlRoot -Directory |
            Where-Object { Test-Path (Join-Path $_.FullName "include/curl/curl.h") } |
            Select-Object -First 1

          if (-not $curlPrefix) {
            throw "Failed to locate extracted libcurl include/lib directories"
          }

          $includeDir = Join-Path $curlPrefix.FullName "include"
          $libDir = Join-Path $curlPrefix.FullName "lib"
          $binDir = Join-Path $curlPrefix.FullName "bin"

          Add-Content -Path $env:GITHUB_ENV -Value "CURL_ROOT=$($curlPrefix.FullName)"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_PREFIX_PATH=$($curlPrefix.FullName)"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_INCLUDE_PATH=$includeDir"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_LIBRARY_PATH=$libDir"
          Add-Content -Path $env:GITHUB_ENV -Value "PATH=$binDir;$env:PATH"

      # run cibuildwheel to build wheels for the specified Python version
      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1

      - name: Verify clean directory
        run: git diff --exit-code
        shell: bash

      # upload the wheels as an artifact (adds a `dev-` prefix for PRs)
      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ github.event_name == 'pull_request' && 'dev-' || '' }}cibw-wheels-${{ inputs.runs-on }}
          path: wheelhouse/*.whl

      - name: Show sccache stats
        if: ${{ !startsWith(inputs.runs-on, 'ubuntu') }}
        run: sccache --show-stats
