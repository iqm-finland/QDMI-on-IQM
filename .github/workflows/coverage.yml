name: Coverage

on:
  push:
    branches: ["main"]
  pull_request:
  merge_group:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-24.04

    steps:
      - name: Clone Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl libcurl4-openssl-dev

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          variant: ccache
          save: true
          max-size: 10G

      - name: Setup mold
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_IQM_QDMI_TESTS=ON -DIQM_QDMI_COVERAGE=ON

      - name: Build
        run: cmake --build build  --config Debug -j4

      - name: Test
        working-directory: build
        env:
          IQM_BASE_URL: "https://resonance.meetiqm.com"
          IQM_QC_ALIAS: "emerald:mock"
          RESONANCE_API_KEY: ${{ secrets.RESONANCE_API_KEY }}
          IQM_CPP_API_LOG_LEVEL: "DEBUG"
        run: ctest --verbose --output-on-failure --repeat until-pass:3 --parallel 4 --timeout 600

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: true
          flags: cpp
          use_oidc: true
