name: 🇨 • Tests • windows
on:
  workflow_call:
    inputs:
      runs-on:
        description: >
          The Windows runner image to use. Defaults to 'windows-latest'.
          This can be any valid Windows runner image, such as 'windows-2022' or 'windows-2025'.
        default: "windows-latest"
        type: string
      config:
        description: >
          The build type to use. Defaults to 'Release'.
          This can be any valid CMake build type, such as 'Debug' or 'Release'.
        default: "Release"
        type: string
      iqm-qc-alias:
        description: >
          The alias of the IQM quantum computer to use for testing. Defaults to 'emerald:mock'.
          This can be any valid IQM quantum computer alias.
        default: "emerald:mock"
        type: string
    secrets:
      RESONANCE_API_KEY:
        required: true

defaults:
  run:
    shell: pwsh

jobs:
  cpp-tests-windows:
    name: 🏁 ${{ inputs.runs-on }} ${{ inputs.config }} ${{ inputs.iqm-qc-alias }}
    runs-on: ${{ inputs.runs-on }}
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 4
      FORCE_COLOR: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Set up ccache for faster C++ builds
      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@f433cb1e0b3ed576864d7fc361ce43b23b181e67 # v1.5.4
        with:
          prepend_symlinks_to_path: false
          override_cache_key: c++-tests-${{ inputs.runs-on }}-${{ inputs.config }}
          windows_compile_environment: msvc
      - name: Install prebuilt libcurl
        run: |
          $ErrorActionPreference = "Stop"

          $arch = "${{ runner.arch }}".ToUpperInvariant()
          switch ($arch) {
            "X64" { $curlUrl = "https://curl.se/windows/latest.cgi?p=win64-mingw.zip" }
            "ARM64" { $curlUrl = "https://curl.se/windows/latest.cgi?p=win64a-mingw.zip" }
            default { throw "Unsupported Windows architecture: $arch" }
          }

          $curlRoot = Join-Path $env:RUNNER_TEMP "curl-prebuilt"
          $zipPath = Join-Path $curlRoot "curl.zip"
          New-Item -Path $curlRoot -ItemType Directory -Force | Out-Null
          Invoke-WebRequest -Uri $curlUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $curlRoot -Force

          $curlPrefix = Get-ChildItem -Path $curlRoot -Directory |
            Where-Object { Test-Path (Join-Path $_.FullName "include/curl/curl.h") } |
            Select-Object -First 1

          if (-not $curlPrefix) {
            throw "Failed to locate extracted libcurl include/lib directories"
          }

          $includeDir = Join-Path $curlPrefix.FullName "include"
          $libDir = Join-Path $curlPrefix.FullName "lib"
          $binDir = Join-Path $curlPrefix.FullName "bin"

          Add-Content -Path $env:GITHUB_ENV -Value "CURL_ROOT=$($curlPrefix.FullName)"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_PREFIX_PATH=$($curlPrefix.FullName)"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_INCLUDE_PATH=$includeDir"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_LIBRARY_PATH=$libDir"
          Add-Content -Path $env:GITHUB_ENV -Value "PATH=$binDir;$env:PATH"
      - name: Configure CMake
        env:
          CONFIG: ${{ inputs.config }}
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE="$env:CONFIG"
          -DCURL_ROOT="$env:CURL_ROOT"
      - name: Build
        env:
          CONFIG: ${{ inputs.config }}
        run: cmake --build build --config $env:CONFIG --verbose
      - name: Test
        env:
          CONFIG: ${{ inputs.config }}
          IQM_BASE_URL: "https://resonance.meetiqm.com"
          IQM_QC_ALIAS: ${{ inputs.iqm-qc-alias }}
          RESONANCE_API_KEY: ${{ secrets.RESONANCE_API_KEY }}
          IQM_CPP_API_LOG_LEVEL: "DEBUG"
        run: ctest -C $env:CONFIG --output-on-failure --test-dir build --timeout 600 --repeat until-pass:3
